name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # laisladeltrading — Mac Apple Silicon
          - app: laisladeltrading
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
          # laisladeltrading — Mac Intel
          - app: laisladeltrading
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
          # laisladeltrading — Windows
          - app: laisladeltrading
            platform: windows-latest
            args: ''
          # laisladeltrading — Linux
          - app: laisladeltrading
            platform: ubuntu-22.04
            args: ''
          # ── Add new community below (4 lines per community) ──────────────
          # - app: nuevacomunidad
          #   platform: macos-latest
          #   args: '--target aarch64-apple-darwin'
          # (repeat for x86_64, windows-latest, ubuntu-22.04)

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: apps/${{ matrix.app }}
        run: npm install

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/${{ matrix.app }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Wandari Desktop v__VERSION__'
          releaseBody: |
            ## Descarga tu comunidad

            Elige el instalador para tu sistema operativo.

            | App | Mac (Apple Silicon) | Mac (Intel) | Windows | Linux |
            |-----|---------------------|-------------|---------|-------|
            | La Isla del Trading | `*_aarch64.dmg` | `*_x64.dmg` | `*.msi` | `*.AppImage` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
