name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # laisladeltrading — Mac Apple Silicon
          - app: laisladeltrading
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
          # laisladeltrading — Mac Intel
          - app: laisladeltrading
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
          # laisladeltrading — Windows
          - app: laisladeltrading
            platform: windows-latest
            args: ''
          # laisladeltrading — Linux
          - app: laisladeltrading
            platform: ubuntu-22.04
            args: ''
          # learn (Engineer Game) — Mac Apple Silicon
          - app: learn
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
          # learn — Mac Intel
          - app: learn
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
          # learn — Windows
          - app: learn
            platform: windows-latest
            args: ''
          # learn — Linux
          - app: learn
            platform: ubuntu-22.04
            args: ''
          # tribu13 — Mac Apple Silicon
          - app: tribu13
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
          # tribu13 — Mac Intel
          - app: tribu13
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
          # tribu13 — Windows
          - app: tribu13
            platform: windows-latest
            args: ''
          # tribu13 — Linux
          - app: tribu13
            platform: ubuntu-22.04
            args: ''
          # ── Add new community below (4 lines per community) ──────────────

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: apps/${{ matrix.app }}
        run: npm install

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/${{ matrix.app }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Wandari Desktop v__VERSION__'
          releaseBody: |
            ## Descarga tu comunidad

            Elige el instalador para tu sistema operativo.

            | App | Mac (Apple Silicon) | Mac (Intel) | Windows | Linux |
            |-----|---------------------|-------------|---------|-------|
            | La Isla del Trading | `La Isla del Trading_*_aarch64.dmg` | `La Isla del Trading_*_x64.dmg` | `La Isla del Trading_*.msi` | `la-isla-del-trading_*.AppImage` |
            | Engineer Game | `Engineer Game_*_aarch64.dmg` | `Engineer Game_*_x64.dmg` | `Engineer Game_*.msi` | `engineer-game_*.AppImage` |
            | Tribu 13 | `Tribu 13_*_aarch64.dmg` | `Tribu 13_*_x64.dmg` | `Tribu 13_*.msi` | `tribu-13_*.AppImage` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: laisladeltrading-android
            apkName: La.Isla.del.Trading
          - app: learn-android
            apkName: Engineer.Game
          - app: tribu13-android
            apkName: Tribu.13

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install deps
        working-directory: apps/${{ matrix.app }}
        run: npm install

      - name: Add Android platform
        working-directory: apps/${{ matrix.app }}
        run: npx cap add android

      - name: Build APK
        working-directory: apps/${{ matrix.app }}/android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./apps/${{ matrix.app }}/package.json').version")
          cp apps/${{ matrix.app }}/android/app/build/outputs/apk/release/app-release-unsigned.apk \
             ${{ matrix.apkName }}_${VERSION}.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: ${{ matrix.apkName }}_*.apk
